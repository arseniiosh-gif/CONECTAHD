<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConectaHD</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f6f9; }
    header { background: linear-gradient(135deg, #2563eb, #1e3a8a); color: white; padding: 20px; text-align: center; }
    nav { background: #111827; padding: 12px; text-align: center; }
    nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: 600; }
    section { padding: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .tag { display:inline-block; background:#e0e7ff; padding:5px 10px; border-radius:10px; margin-top:5px; font-size:12px; }
    a.button { display:inline-block; margin-top:10px; background:#2563eb; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; }
    input { padding:10px; width:100%; margin-bottom:20px; border-radius:10px; border:1px solid #ccc; }
  </style>
</head>
<body>

<header>
  <h1>ConectaHD</h1>
  <p>Repositorio académico abierto</p>
</header>

<section>
  <h2>Buscar artículos</h2>
  <input type="text" id="search" placeholder="Buscar por título..." onkeyup="filterArticles()">
</section>

<section>
  <h2>Filtrar por categoría</h2>
  <button onclick="filterCategory('all')">Todos</button>
  <button onclick="filterCategory('Educación digital')">Educación digital</button>
  <button onclick="filterCategory('LATAM')">LATAM</button>
  <button onclick="filterCategory('Pedagogía')">Pedagogía</button>
</section>

<section>
  <h2>Artículos Académicos</h2>
  <div class="grid" id="articles"></div>
</section>

<script>
const articlesData = [
  {title:"Social Media in Education", author:"Gil-Fernández (2021)", category:"Educación digital", link:"https://revistes.ub.edu/index.php/der/article/view/33337"},
  {title:"Data Literacy", author:"Raffaghelli (2022)", category:"Educación digital", link:"https://openaccess.uoc.edu"},
  {title:"Online Learning", author:"Greenhow (2022)", category:"Educación digital", link:"https://scholarsarchive.byu.edu"},
  {title:"Open Pedagogy", author:"Clinton-Lisell (2021)", category:"Pedagogía", link:"https://commons.und.edu"},
  {title:"Educación LATAM", author:"Ramírez (2022)", category:"LATAM", link:"https://academia.edu"},
  {title:"Open Science", author:"Kullmann (2025)", category:"Educación digital", link:"https://mit.edu"},
  {title:"OER Adoption", author:"Tang (2021)", category:"Pedagogía", link:"https://sc.edu"},
  {title:"Open Resources", author:"Study (2020)", category:"Educación digital", link:"https://unl.edu"},
  {title:"Digital Culture", author:"Research (2021)", category:"Educación digital", link:"https://uoc.edu"},
  {title:"Teacher Competence", author:"EU Study (2020)", category:"Pedagogía", link:"https://europa.eu"},
  {title:"Learning Analytics", author:"Study (2022)", category:"Educación digital", link:"#"},
  {title:"Innovation LATAM", author:"UNESCO (2021)", category:"LATAM", link:"#"},
  {title:"Hybrid Learning", author:"Study (2021)", category:"Educación digital", link:"#"},
  {title:"Digital Humanities", author:"Research (2022)", category:"Educación digital", link:"#"},
  {title:"Pedagogical Models", author:"Study (2019)", category:"Pedagogía", link:"#"},
  {title:"Open Knowledge", author:"Study (2023)", category:"Educación digital", link:"#"},
  {title:"EdTech LATAM", author:"Study (2022)", category:"LATAM", link:"#"},
  {title:"Collaborative Learning", author:"Study (2020)", category:"Pedagogía", link:"#"},
  {title:"AI in Education", author:"Study (2024)", category:"Educación digital", link:"#"},
  {title:"Future of Education", author:"Study (2023)", category:"Educación digital", link:"#"}
];

let currentFilter = 'all';

function renderArticles(list) {
  const container = document.getElementById('articles');
  container.innerHTML='';
  list.forEach(a=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<h3>${a.title}</h3><p>${a.author}</p><span class='tag'>${a.category}</span><br><a class='button' href='${a.link}' target='_blank'>Ver artículo</a>`;
    container.appendChild(div);
  });
}

function filterArticles(){
  const text=document.getElementById('search').value.toLowerCase();
  let filtered=articlesData.filter(a=>a.title.toLowerCase().includes(text));
  if(currentFilter!='all') filtered=filtered.filter(a=>a.category==currentFilter);
  renderArticles(filtered);
}

function filterCategory(cat){
  currentFilter=cat;
  filterArticles();
}

renderArticles(articlesData);
</script>

    section { padding: 30px; background: rgba(0,0,0,0.5); margin:20px; border-radius:15px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

    a.button { display:inline-block; margin-top:10px; background:#2563eb; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; }

  <img src="img7.jpeg">
  <img src="img8.jpeg">
  <img src="img9.jpeg">
  <img src="img10.jpeg">
</div>


</body>
</html>
